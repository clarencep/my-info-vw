name: CI

on:
  push:
    branches: [main, dev, develop]
  pull_request:
    branches: [main, dev, develop]

jobs:
  # ── Backend tests ──────────────────────────────────────────────────
  backend-test:
    name: Backend Test (Python 3.13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests with coverage
        run: uv run pytest --cov=src --cov-report=term-missing -q

  # ── Webapp lint & build ────────────────────────────────────────────
  webapp-lint:
    name: Webapp Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: ./webapp
        run: bun install
      - name: Run lint
        working-directory: ./webapp
        run: bun run lint
      - name: Build
        working-directory: ./webapp
        run: bun run build

  # ── Webapp tests ───────────────────────────────────────────────────
  webapp-test:
    name: Webapp Test
    runs-on: ubuntu-latest
    needs: webapp-lint
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: ./webapp
        run: bun install
      - name: Run unit tests
        working-directory: ./webapp
        run: bun run test -- --run

  # ── E2E tests ─────────────────────────────────────────────────────
  e2e-test:
    name: E2E Test (Playwright)
    runs-on: ubuntu-latest
    needs: webapp-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: ./webapp
        run: npm ci
      - name: Install Playwright browsers
        working-directory: ./webapp
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: ./webapp
        run: npx playwright test
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: webapp/playwright-report/
          retention-days: 30
