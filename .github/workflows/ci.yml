name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Run tests
        run: uv run pytest tests/ --cov=src -q

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-info-vw:test .

      - name: Smoke test
        run: docker run --rm --entrypoint python my-info-vw:test -c "from src.llm.manager import LLMManager; print('OK')"
