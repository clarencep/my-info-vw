name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  webapp-lint:
    name: Webapp Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: ./webapp
        run: bun install
      - name: Run lint
        working-directory: ./webapp
        run: bun run lint
      - name: Build
        working-directory: ./webapp
        run: bun run build

  webapp-test:
    name: Webapp Test
    runs-on: ubuntu-latest
    needs: webapp-lint
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: ./webapp
        run: bun install
      - name: Run tests
        working-directory: ./webapp
        run: bun run test -- --run
