# 项目状态跟踪 - 消息核查器 (Info-VW)

## 项目概述

- **项目名称**: my-info-vw (消息核查器)
- **目标**: 基于 LangChain/LangGraph 构建 AI Agents Team，用于多渠道验证核查给定消息的准确性
- **阶段一**: CLI 命令行版 ✅ 完成
- **阶段二**: WebApp ✅ 完成

---

## 已完成功能

### 阶段一：CLI 版本 ✅

- [x] 项目初始化 (uv)
- [x] 4 个 AI Agent
  - MessageParserAgent
  - SearchQueryAgent
  - VerifierAgent
  - SynthesizerAgent
- [x] LangGraph 工作流
- [x] 多渠道搜索
  - Tavily Search
  - Jina Search
  - News Search
  - SearchAggregator (聚合)
- [x] CLI 工具
  - 普通输出模式
  - JSONL 输出模式 (--jsonl)
- [x] 16 个测试用例 (全部通过)
- [x] 代码质量改进 (TypedDict, JSON 解析)

### 阶段二：WebApp ✅

- [x] Next.js 项目初始化
- [x] React + Tailwind CSS UI
- [x] API 路由 (/api/check)
- [x] 调用 Python CLI 获取 JSONL

---

## 使用方式

### CLI
```bash
cd ~/projects/my-info-vw
./info-check.sh "要核查的消息"

# JSONL 输出
uv run python info-check.py "消息" --jsonl
```

### WebApp
```bash
cd ~/projects/my-info-vw/webapp
bun run dev
```

