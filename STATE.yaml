# 项目状态跟踪 - 消息核查器 (Info-VW)

## 项目概述

- **项目名称**: my-info-vw (消息核查器)
- **目标**: 基于 LangChain/LangGraph 构建 AI Agents Team，用于多渠道验证核查给定消息的准确性
- **技术栈**: Python + LangChain/LangGraph + Next.js + React + Tailwind CSS
- **阶段一**: CLI 命令行版
- **阶段二**: WebApp

